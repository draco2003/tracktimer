<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Command - v18</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-dark: #050505; --accent: #22ff00; --warmup: #ffaa00;
            --gearup: #ff0000; --ending: #00ccff; --meeting: #0044ff; --panel: #181818;
        }
        body, html { margin: 0; padding: 0; background-color: var(--bg-dark); color: white; font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden; }

        /* --- UI Framework --- */
        #top-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 30px; background: #000; border-bottom: 1px solid #333; height: 55px; position: absolute; top: 0; width: 100%; z-index: 10; }
        #sys-clock { color: var(--accent); font-family: monospace; font-size: 1.6rem; font-weight: bold; }
        #brand-display { font-weight: 900; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; display: flex; gap: 10px; }
        .top-right-controls { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .gear-btn { font-size: 1.3rem; color: #555; transition: 0.2s; }
        .top-right-controls:hover .gear-btn { color: var(--accent); }

        #app-viewport { display: flex; height: 100vh; width: 100vw; padding-top: 55px; }
        .rider-pane { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; border-right: 1px solid #222; transition: background-color 0.4s ease; }
        .rider-pane:last-child { border-right: none; }
        .rider-pane.hidden { display: none; }

        .timer { font-size: 13vw; font-weight: 900; line-height: 0.8; font-variant-numeric: tabular-nums; }
        .p-label { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; }
        .status-label { font-size: 2.8rem; font-weight: 900; text-transform: uppercase; margin-top: 15px; }
        .sub-text { font-size: 1.4rem; opacity: 0.7; margin-top: 8px; }
        .session-tag { position: absolute; top: 20px; font-weight: bold; opacity: 0.3; font-size: 1.1rem; }

        /* States */
        .state-warmup { background-color: var(--warmup); color: black; }
        .state-gearup { background-color: var(--gearup); color: white; }
        .state-ending { background-color: var(--ending); color: white; }
        .state-meeting { background-color: var(--meeting); color: white; }
        .state-warmup .timer, .state-warmup .p-label { color: black; }
        .blink { animation: blinker 1.2s step-end infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        /* --- Settings Overlay --- */
        #settings-overlay { position: fixed; top: 0; right: -420px; width: 380px; height: 100%; background: var(--panel); box-shadow: -15px 0 50px rgba(0,0,0,0.9); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding: 20px; overflow-y: auto; border-left: 1px solid #333; }
        #settings-overlay.open { right: 0; }
        
        .section { margin-bottom: 20px; border-bottom: 1px solid #2a2a2a; padding-bottom: 15px; }
        .section-title { font-size: 0.65rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; margin-bottom: 15px; display: block; }

        /* Row Logic */
        .config-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .config-row label { flex: 1; font-size: 0.8rem; font-weight: 600; color: #ccc; margin-bottom: 0; }
        
        .alert-row { display: grid; grid-template-columns: 40px 1fr 60px 40px; align-items: center; gap: 10px; margin-bottom: 12px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; }
        .alert-row label { font-size: 0.75rem; font-weight: bold; color: #eee; }

        /* Input Controls - Scoped to avoid switch conflict */
        input[type="text"], input[type="number"], select, input[type="time"] { 
            background: #000; color: #fff; border: 1px solid #444; padding: 6px 8px; border-radius: 4px; font-size: 0.85rem; 
        }
        input[type="number"] { width: 60px; text-align: center; }
        input[type="time"] { width: 110px !important; }

        /* Color Picker Swatch */
        input[type="color"] { -webkit-appearance: none; border: none; width: 32px; height: 32px; padding: 0; background: none; cursor: pointer; border-radius: 4px; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #333; border-radius: 4px; }

        .btn-save { background: var(--accent); color: #000; border: none; padding: 12px; width: 100%; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; margin-top: 10px; letter-spacing: 1px; }

        /* --- SWITCH LOCKDOWN --- */
        .switch { 
            position: relative; 
            display: inline-block !important; 
            width: 36px !important; /* Fixed width */
            height: 20px !important; /* Fixed height */
            flex: 0 0 36px !important; /* Prevent flex growth/shrink */
            cursor: pointer;
            margin: 0 !important;
            padding: 0 !important;
        }
        .switch input { 
            opacity: 0; 
            width: 0 !important; 
            height: 0 !important; 
            position: absolute; 
            margin: 0 !important;
        }
        .slider { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #333; transition: .3s; border-radius: 20px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 14px; width: 14px; 
            left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body>

    <div id="top-bar">
        <div><span id="sys-clock">--:--:--</span> <span id="debug-tag" style="color:#f0f; font-size:0.6rem; display:none; vertical-align: middle; margin-left:5px;">DEBUG</span></div>
        <div id="brand-display"><span id="header-brand-name">ROWE</span> <span id="header-brand-number">#418</span></div>
        <div class="top-right-controls" onclick="toggleSettings()">
            <div id="top-title-text" style="font-size: 0.75rem; opacity: 0.6; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Track Command</div>
            <i class="fas fa-cog gear-btn"></i>
        </div>
    </div>

    <div id="app-viewport">
        <div id="pane-1" class="rider-pane"><div id="p1-session" class="session-tag">SESSION -/-</div><div id="p1-name" class="p-label">Rider 1</div><div id="p1-timer" class="timer">--:--</div><div id="p1-status" class="status-label">STANDBY</div><div id="p1-sub" class="sub-text">System Ready</div></div>
        <div id="pane-2" class="rider-pane hidden"><div id="p2-session" class="session-tag">SESSION -/-</div><div id="p2-name" class="p-label">Rider 2</div><div id="p2-timer" class="timer">--:--</div><div id="p2-status" class="status-label">STANDBY</div><div id="p2-sub" class="sub-text">System Ready</div></div>
    </div>

    <div id="settings-overlay">
        <div class="section">
            <span class="section-title">Branding</span>
            <div class="config-row"><label>Display</label><input type="text" id="brand-name-in" placeholder="ROWE" style="flex:2"><input type="text" id="brand-num-in" placeholder="#418" style="flex:1"></div>
        </div>

        <div class="section">
            <span class="section-title">Global Schedule</span>
            <div class="config-row"><label>1st Session Hr</label><input type="number" id="start-hour" value="9"></div>
            <div class="config-row"><label>Lunch Break</label><select id="lunch-hour" style="width:110px"><option value="12">12:00 PM</option><option value="13">1:00 PM</option></select></div>
            <div class="config-row"><label>Rotation Length</label><select id="rot-length" onchange="updateSlots()" style="width:110px"><option value="20">20 Minutes</option><option value="15">15 Minutes</option></select></div>
            <div class="config-row"><label>Clock Format</label><select id="clock-fmt" style="width:110px"><option value="24">24-Hour</option><option value="12">AM/PM</option></select></div>
        </div>

        <div class="section">
            <span class="section-title">Alert Configurations</span>
            <div class="alert-row">
                <label class="switch"><input type="checkbox" id="mtg-enabled"><span class="slider"></span></label>
                <label>Riders Meeting</label>
                <input type="time" id="riders-time" style="grid-column: span 2; width: 100% !important;">
            </div>
            <div class="alert-row">
                <label class="switch"><input type="checkbox" id="wu-enabled"><span class="slider"></span></label>
                <label>Warmup Alert</label>
                <input type="number" id="wu-time" placeholder="Min">
                <input type="color" id="clr-warmup">
            </div>
            <div class="alert-row">
                <label class="switch"><input type="checkbox" id="gu-enabled"><span class="slider"></span></label>
                <label>Gear Up Alert</label>
                <input type="number" id="gu-time" placeholder="Min">
                <input type="color" id="clr-gearup">
            </div>
            <div class="alert-row">
                <label class="switch"><input type="checkbox" id="sp-enabled"><span class="slider"></span></label>
                <label>Stand Prep</label>
                <input type="number" id="sp-time" placeholder="Min">
                <input type="color" id="clr-ending">
            </div>
        </div>

        <div class="section">
            <span class="section-title">Riders</span>
            <div class="config-row"><label>Rider 1 Name</label><input type="text" id="p1-label-in" style="flex:2"><select id="p1-slot-in" style="flex:1"></select></div>
            <div class="config-row" style="margin-top:15px"><label>Enable Split View</label><label class="switch"><input type="checkbox" id="s-enabled"><span class="slider"></span></label></div>
            <div class="config-row"><label>Rider 2 Name</label><input type="text" id="p2-label-in" style="flex:2"><select id="p2-slot-in" style="flex:1"></select></div>
        </div>

        <div class="section">
            <span class="section-title">Advanced</span>
            <div class="config-row"><label>Debug Override</label><label class="switch"><input type="checkbox" id="dbg-on"><span class="slider"></span></label></div>
            <div class="config-row"><label>System Time</label><input type="time" id="dbg-time" step="1"></div>
            <div class="config-row"><label>Accent Color</label><input type="color" id="clr-accent" value="#22ff00"></div>
        </div>

        <button class="btn-save" onclick="save()">Apply All Changes</button>
        <p style="font-size:0.55rem; color:#444; margin-top:15px; text-align:center; cursor:pointer;" onclick="localStorage.clear(); location.reload();">Hard Reset App Data</p>
    </div>

    <script>
        let p1Sched = [], p2Sched = [], offset = 0, meetingTime = null;

        function toggleSettings() { document.getElementById('settings-overlay').classList.toggle('open'); }
        function updateSlots() {
            const len = parseInt(document.getElementById('rot-length').value) || 20;
            const p1 = document.getElementById('p1-slot-in'), p2 = document.getElementById('p2-slot-in');
            p1.innerHTML = ''; p2.innerHTML = '';
            const steps = len === 20 ? [0, 20, 40] : [0, 15, 30, 45];
            steps.forEach(m => { const txt = `:${m.toString().padStart(2, '0')}`; p1.add(new Option(txt, m)); p2.add(new Option(txt, m)); });
        }

        function save() {
            const data = {
                brand: { name: document.getElementById('brand-name-in').value || "ROWE", num: document.getElementById('brand-num-in').value || "#418" },
                sh: document.getElementById('start-hour').value, lh: document.getElementById('lunch-hour').value,
                rl: document.getElementById('rot-length').value, cf: document.getElementById('clock-fmt').value,
                p1l: document.getElementById('p1-label-in').value, p1s: document.getElementById('p1-slot-in').value,
                p2e: document.getElementById('s-enabled').checked, p2l: document.getElementById('p2-label-in').value, p2s: document.getElementById('p2-slot-in').value,
                db: document.getElementById('dbg-on').checked, dt: document.getElementById('dbg-time').value,
                alerts: {
                    mtg: document.getElementById('mtg-enabled').checked, mtgTime: document.getElementById('riders-time').value,
                    wu: document.getElementById('wu-enabled').checked, wuMins: document.getElementById('wu-time').value,
                    gu: document.getElementById('gu-enabled').checked, guMins: document.getElementById('gu-time').value,
                    sp: document.getElementById('sp-enabled').checked, spMins: document.getElementById('sp-time').value
                },
                colors: { accent: document.getElementById('clr-accent').value, warmup: document.getElementById('clr-warmup').value, gearup: document.getElementById('clr-gearup').value, ending: document.getElementById('clr-ending').value }
            };
            localStorage.setItem('track_cmd_v18', JSON.stringify(data));
            init(); toggleSettings();
        }

        function init() {
            const cfg = JSON.parse(localStorage.getItem('track_cmd_v18')) || { alerts: { mtg: true, wu: true, wuMins: 10, gu: true, guMins: 5, sp: true, spMins: 3 } };
            const root = document.documentElement;
            if(cfg.brand) { document.getElementById('header-brand-name').innerText = cfg.brand.name; document.getElementById('header-brand-number').innerText = cfg.brand.num; }
            if(cfg.colors) { root.style.setProperty('--accent', cfg.colors.accent); root.style.setProperty('--warmup', cfg.colors.warmup); root.style.setProperty('--gearup', cfg.colors.gearup); root.style.setProperty('--ending', cfg.colors.ending); }
            
            p1Sched = []; p2Sched = [];
            const [mH, mM] = (cfg.alerts?.mtgTime || "08:00").split(':').map(Number);
            meetingTime = new Date(); meetingTime.setHours(mH, mM, 0, 0);

            for(let h=parseInt(cfg.sh)||9; h<=17; h++) {
                if(h === parseInt(cfg.lh)) continue;
                p1Sched.push(new Date(new Date().setHours(h, parseInt(cfg.p1s)||0, 0, 0)));
                p2Sched.push(new Date(new Date().setHours(h, parseInt(cfg.p2s)||20, 0, 0)));
            }
            if(cfg.db && cfg.dt) { const [hh, mm, ss] = cfg.dt.split(':').map(Number); offset = new Date().setHours(hh, mm, ss || 0) - Date.now(); document.getElementById('debug-tag').style.display = 'inline'; } else { offset = 0; document.getElementById('debug-tag').style.display = 'none'; }
            document.getElementById('pane-2').className = cfg.p2e ? 'rider-pane' : 'rider-pane hidden';
        }

        function processRider(paneId, schedule, now, len, is12, label, alerts) {
            const pane = document.getElementById(paneId), timerEl = pane.querySelector('.timer'), statusEl = pane.querySelector('.status-label'), subEl = pane.querySelector('.sub-text');
            pane.querySelector('.p-label').innerText = label;

            if (alerts.mtg && now < meetingTime) {
                pane.className = 'rider-pane state-meeting'; timerEl.innerText = formatTime(meetingTime - now);
                statusEl.innerText = 'RIDERS MEETING'; subEl.innerText = `Starts at ${meetingTime.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:is12})}`;
                return;
            }

            const idx = schedule.findIndex(s => (s.getTime() + len*60000) > now.getTime());
            if (idx === -1) { pane.className = 'rider-pane state-ready'; statusEl.innerText = "DAY COMPLETE"; timerEl.innerText = "--:--"; return; }

            const start = schedule[idx], end = new Date(start.getTime() + len*60000);
            pane.querySelector('.session-tag').innerText = `SESSION ${idx + 1} OF ${schedule.length}`;

            if (now < start) {
                const diff = start - now, diffMin = diff/60000;
                timerEl.innerText = formatTime(diff); subEl.innerText = `Starts at ${start.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:is12})}`;
                if (alerts.gu && diffMin < alerts.guMins) { pane.className = 'rider-pane state-gearup'; statusEl.innerText = 'GEAR UP'; }
                else if (alerts.wu && diffMin < alerts.wuMins) { pane.className = 'rider-pane state-warmup'; statusEl.innerText = 'WARM UP'; }
                else { pane.className = 'rider-pane state-ready'; statusEl.innerText = 'READY'; }
            } else {
                const diffEnd = end - now, diffEndMin = diffEnd/60000;
                timerEl.innerText = formatTime(diffEnd); subEl.innerText = 'ON TRACK';
                if (alerts.sp && diffEndMin < alerts.spMins) { pane.className = 'rider-pane state-ending blink'; statusEl.innerText = 'GET STANDS'; }
                else { pane.className = 'rider-pane state-ready'; statusEl.innerText = 'HOT SESSION'; }
            }
        }

        function tick() {
            const cfg = JSON.parse(localStorage.getItem('track_cmd_v18')) || { alerts: { mtg: true, wu: true, wuMins: 10, gu: true, guMins: 5, sp: true, spMins: 3 } };
            const now = new Date(Date.now() + offset);
            processRider('pane-1', p1Sched, now, parseInt(cfg.rl)||20, cfg.cf==='12', cfg.p1l||"Rider 1", cfg.alerts);
            if (cfg.p2e) processRider('pane-2', p2Sched, now, parseInt(cfg.rl)||20, cfg.cf==='12', cfg.p2l||"Rider 2", cfg.alerts);
            document.getElementById('sys-clock').innerText = now.toLocaleTimeString([], {hour12: cfg.cf==='12', hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }

        function formatTime(ms) { const m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000); return `${m}:${s.toString().padStart(2,'0')}`; }

        window.onload = () => {
            updateSlots(); const saved = localStorage.getItem('track_cmd_v18');
            if(saved) {
                const c = JSON.parse(saved);
                document.getElementById('brand-name-in').value = c.brand?.name || ""; document.getElementById('brand-num-in').value = c.brand?.num || "";
                document.getElementById('start-hour').value = c.sh; document.getElementById('lunch-hour').value = c.lh;
                document.getElementById('rot-length').value = c.rl; updateSlots();
                document.getElementById('clock-fmt').value = c.cf; document.getElementById('p1-label-in').value = c.p1l;
                document.getElementById('p1-slot-in').value = c.p1s; document.getElementById('s-enabled').checked = c.p2e;
                document.getElementById('p2-label-in').value = c.p2l; document.getElementById('p2-slot-in').value = c.p2s;
                document.getElementById('dbg-on').checked = c.db; document.getElementById('dbg-time').value = c.dt;
                document.getElementById('mtg-enabled').checked = c.alerts.mtg; document.getElementById('riders-time').value = c.alerts.mtgTime;
                document.getElementById('wu-enabled').checked = c.alerts.wu; document.getElementById('wu-time').value = c.alerts.wuMins;
                document.getElementById('gu-enabled').checked = c.alerts.gu; document.getElementById('gu-time').value = c.alerts.guMins;
                document.getElementById('sp-enabled').checked = c.alerts.sp; document.getElementById('sp-time').value = c.alerts.spMins;
                if(c.colors) { document.getElementById('clr-accent').value = c.colors.accent; document.getElementById('clr-warmup').value = c.colors.warmup; document.getElementById('clr-gearup').value = c.colors.gearup; document.getElementById('clr-ending').value = c.colors.ending; }
            }
            init(); setInterval(tick, 1000);
        };
    </script>
</body>
</html>

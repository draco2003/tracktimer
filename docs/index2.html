<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Command v3.4 - Timing Fix</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #1a1a1a;
            --text-main: #ffffff;
            --accent: #00e5ff;
            --warmup: #ffeb3b;
            --gearup: #ff5722;
            --ending: #f44336;
            --ready: #4caf50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            overflow: hidden;
            height: 100vh; width: 100vw;
        }

        header {
            height: 60px;
            background: #000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 2px solid #333;
            justify-content: space-between;
            z-index: 10;
        }

        .brand-box { display: flex; align-items: center; gap: 10px; }
        #header-brand-name { font-weight: 800; font-size: 1.5rem; text-transform: uppercase; }
        #header-brand-number { background: var(--accent); color: #000; padding: 2px 8px; font-weight: 900; border-radius: 4px; }
        #sys-clock { font-family: monospace; font-size: 1.8rem; font-weight: bold; }
        
        .controls { display: flex; gap: 10px; }
        .icon-btn { cursor: pointer; background: #333; border: none; color: white; padding: 8px 15px; border-radius: 4px; font-size: 0.9rem; font-weight: bold; }
        .icon-btn:focus { outline: 3px solid var(--accent); background: #444; }

        /* Grid Engine */
        #main-viewport { display: grid; height: calc(100vh - 60px); width: 100vw; overflow: hidden; }
        #main-viewport.layout-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        #main-viewport.layout-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        #main-viewport.layout-3 .group-pane:first-child { grid-column: span 2; }
        #main-viewport.layout-2 { grid-template-columns: 1fr 1fr; }
        #main-viewport.layout-1 { grid-template-columns: 1fr; }

        .group-pane {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid #222; position: relative; text-align: center; padding: 10px;
        }

        .session-tag { position: absolute; top: 15px; left: 15px; font-weight: bold; opacity: 0.4; font-size: 1.2rem; }
        .group-label { font-weight: 900; text-transform: uppercase; line-height: 1; }
        .countdown-timer { font-family: monospace; line-height: 0.8; font-weight: bold; }
        .status-label { font-weight: 800; margin-top: 10px; }

        /* Sizing for Grid */
        .layout-4 .group-label, .layout-3 .group-label { font-size: 3vw; }
        .layout-4 .countdown-timer, .layout-3 .countdown-timer { font-size: 8vw; }
        .layout-3 .group-pane:first-child .group-label { font-size: 4vw; }
        .layout-3 .group-pane:first-child .countdown-timer { font-size: 12vw; }
        .layout-2 .group-label { font-size: 5vw; }
        .layout-2 .countdown-timer { font-size: 12vw; }
        .layout-1 .group-label { font-size: 8vw; }
        .layout-1 .countdown-timer { font-size: 18vw; }

        .state-sleep { background: #000; opacity: 0.3; }
        .state-meeting { color: var(--accent); }
        .state-ready { color: var(--ready); }
        .state-warmup { color: var(--warmup); }
        .state-gearup { color: var(--gearup); }
        .state-ending { color: var(--ending); }
        
        #awake-video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }

        /* Settings Optimization */
        .overlay { position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: none; padding: 15px; }
        .overlay-content { background: var(--panel-bg); padding: 20px; border-radius: 12px; max-width: 1200px; margin: 0 auto; border: 2px solid #444; }
        .settings-grid { display: grid; grid-template-columns: 280px 1fr 1fr; gap: 20px; }
        .setting-group { margin-bottom: 10px; }
        .setting-group label { display: block; font-size: 0.7rem; margin-bottom: 3px; color: #aaa; text-transform: uppercase; }
        .setting-group input, .setting-group select { width: 100%; padding: 8px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; font-size: 0.9rem; }
        .setting-group input:focus { outline: 2px solid var(--accent); }
        .group-config-row { display: grid; grid-template-columns: 30px 1fr 80px; gap: 10px; align-items: center; margin-bottom: 8px; background: rgba(255,255,255,0.03); padding: 5px; border-radius: 4px; }
        .save-btn { background: var(--ready); color: white; border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; margin-top: 10px;}
    </style>
</head>
<body onload="init()">

    <video id="awake-video" muted loop playsinline autoplay>
        <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAA5tZGF0AAAAAAAAAAIAbWF2Yy9tcDRhAAAABm1vb3YAAABsbXZoZAAAAADbe0v923tL/QAAZAAAAAAQAAABAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAACAAAAGWlvZHMAAAAAEAAfQYCAgP/EAAAABHRyYWsAAABcdGtoZAAAAADbe0v923tL/QAAAAEAAAAAAABkAAAAAAAAAAAAAAAAAQAAAAEAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAAABttZGlhAAAAIG1kaGQAAAAA23tL/dt7S/0AAGQAAAAAABVshAAAAC1oZGVyAAAAAAAAABxoZGVyAAAAAAAAABxoZGVyAAAAAAAAABxoZGVyAAAAAAAAABxoZGVyAAAAAAAAABxoZGVyAAAAAAAAABxoZGVyAAAAAAAAABxoZGVyAAAAAAAAABxoZGVyAAAAAAA=" type="video/mp4">
    </video>

    <header>
        <div class="brand-box">
            <span id="header-brand-name">DAN ROWE</span>
            <span id="header-brand-number">45</span>
        </div>
        <div id="sys-clock">00:00:00</div>
        <div class="controls">
            <button class="icon-btn" onclick="togglePanel('settings-overlay')">SETTINGS</button>
        </div>
    </header>

    <main id="main-viewport"></main>

    <div id="settings-overlay" class="overlay">
        <div class="overlay-content">
            <h2>Track Timing Configuration</h2>
            <div class="settings-grid">
                <div class="col">
                    <div class="setting-group"><label>Track Start (Hot Hour)</label><input type="number" id="cfg-start-h" placeholder="e.g. 9"></div>
                    <div class="setting-group"><label>Group A Offset (Min)</label><input type="number" id="cfg-start-m" placeholder="e.g. 0"></div>
                    <div class="setting-group"><label>Rider Meeting Time</label><input type="time" id="cfg-meet-t"></div>
                    <div class="setting-group">
                        <label>Rotation Length</label>
                        <select id="cfg-rot" onchange="renderGroupSettings()">
                            <option value="15">15 Minutes</option>
                            <option value="20">20 Minutes</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>Lunch Break</label>
                        <select id="cfg-lunch">
                            <option value="0">None</option>
                            <option value="12">12:00 PM</option>
                            <option value="13">1:00 PM</option>
                        </select>
                    </div>
                </div>
                <div class="col" style="grid-column: span 2;">
                    <div id="group-config-container"></div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; border-top: 1px solid #444; padding-top:10px;">
                        <div class="setting-group"><label>Lead Times (W/G/S)</label>
                            <div style="display:flex; gap:5px;"><input type="number" id="cfg-pre-w"><input type="number" id="cfg-pre-g"><input type="number" id="cfg-pre-s"></div>
                        </div>
                        <div class="setting-group"><label>Debug Override</label>
                            <div style="display:flex; gap:5px;"><input type="checkbox" id="cfg-dbg-on"><input type="time" id="cfg-dbg-time" step="1"></div>
                        </div>
                    </div>
                </div>
            </div>
            <button class="save-btn" onclick="save()">SAVE & APPLY</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'track_cmd_v34';
        let config = {};
        let groupSchedules = {};

        function togglePanel(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        function renderGroupSettings() {
            const rot = parseInt(document.getElementById('cfg-rot').value);
            const container = document.getElementById('group-config-container');
            const count = (rot === 15) ? 4 : 3;
            const startM = parseInt(document.getElementById('cfg-start-m').value) || 0;
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const offset = (startM + (i * rot)) % 60;
                const saved = config.groups ? config.groups[i] : null;
                container.insertAdjacentHTML('beforeend', `
                    <div class="group-config-row">
                        <input type="checkbox" class="grp-enable" ${saved?.enabled !== false ? 'checked' : ''} data-idx="${i}">
                        <input type="text" class="grp-label" value="${saved?.label || 'Group ' + String.fromCharCode(65+i)}" data-idx="${i}">
                        <div style="font-size: 0.8rem; color: #888;">Starts :${offset.toString().padStart(2, '0')}</div>
                    </div>
                `);
            }
        }

        function save() {
            const groupInputs = document.querySelectorAll('.group-config-row');
            let groups = [];
            groupInputs.forEach(row => {
                groups.push({ enabled: row.querySelector('.grp-enable').checked, label: row.querySelector('.grp-label').value });
            });

            config = {
                startHour: parseInt(document.getElementById('cfg-start-h').value),
                startMin: parseInt(document.getElementById('cfg-start-m').value),
                meetTime: document.getElementById('cfg-meet-t').value,
                rot: parseInt(document.getElementById('cfg-rot').value),
                lunchHour: parseInt(document.getElementById('cfg-lunch').value),
                preWarmup: parseInt(document.getElementById('cfg-pre-w').value),
                preGear: parseInt(document.getElementById('cfg-pre-g').value),
                preStand: parseInt(document.getElementById('cfg-pre-s').value),
                dbgOn: document.getElementById('cfg-dbg-on').checked,
                dbgTime: document.getElementById('cfg-dbg-time').value,
                groups: groups
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
            location.reload();
        }

        function init() {
            const saved = localStorage.getItem(STORAGE_KEY);
            config = saved ? JSON.parse(saved) : {
                startHour: 9, startMin: 0, rot: 15, lunchHour: 12, meetTime: "08:15",
                preWarmup: 10, preGear: 5, preStand: 2, dbgOn: false, dbgTime: "08:00:00",
                groups: [{enabled: true, label: "Group A"}, {enabled: true, label: "Group B"}, {enabled: true, label: "Group C"}, {enabled: true, label: "Group D"}]
            };

            document.getElementById('cfg-start-h').value = config.startHour;
            document.getElementById('cfg-start-m').value = config.startMin;
            document.getElementById('cfg-meet-t').value = config.meetTime;
            document.getElementById('cfg-rot').value = config.rot;
            document.getElementById('cfg-lunch').value = config.lunchHour;
            document.getElementById('cfg-pre-w').value = config.preWarmup;
            document.getElementById('cfg-pre-g').value = config.preGear;
            document.getElementById('cfg-pre-s').value = config.preStand;
            document.getElementById('cfg-dbg-on').checked = config.dbgOn;
            document.getElementById('cfg-dbg-time').value = config.dbgTime;
            renderGroupSettings();

            const viewport = document.getElementById('main-viewport');
            viewport.innerHTML = '';
            let enabledCount = 0;
            config.groups.forEach((grp, idx) => {
                if (grp.enabled) {
                    enabledCount++;
                    viewport.insertAdjacentHTML('beforeend', `
                        <div id="pane-${idx}" class="group-pane">
                            <div class="session-tag">SESS 1</div>
                            <div class="group-label">${grp.label}</div>
                            <div class="countdown-timer">--:--</div>
                            <div class="status-label">STANDBY</div>
                        </div>
                    `);
                    groupSchedules[idx] = generateSchedule(idx);
                }
            });
            viewport.className = `layout-${enabledCount}`;
            setInterval(tick, 1000);
        }

        function generateSchedule(groupIdx) {
            let sched = [];
            let sessionCounter = 1;
            const baseStartM = config.startMin || 0;
            const offsetMinutes = baseStartM + (groupIdx * config.rot);
            
            // Loop from Track Start Hour through evening
            for (let h = config.startHour; h < 18; h++) {
                if (config.lunchHour !== 0 && h === config.lunchHour) continue;
                
                let start = new Date();
                start.setHours(h, offsetMinutes, 0, 0);
                
                let end = new Date(start.getTime() + (config.rot * 60000));
                sched.push({ start, end, label: `SESS ${sessionCounter++}` });
            }
            return sched;
        }

        function formatTime(ms) {
            const totalSecs = Math.max(0, Math.floor(ms / 1000));
            const m = Math.floor(totalSecs / 60);
            const s = totalSecs % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function processGroup(idx, schedule) {
            const now = getNow();
            const pane = document.getElementById(`pane-${idx}`);
            if (!pane) return;

            // 1. Meeting Check (Global)
            if (config.meetTime) {
                const [mH, mM] = config.meetTime.split(':');
                const meetStart = new Date(); meetStart.setHours(mH, mM, 0, 0);
                const meetEnd = new Date(meetStart.getTime() + (20 * 60000)); // Assume 20m meeting

                if (now < meetEnd && now >= meetStart) {
                    updatePane(pane, 'state-meeting', "MEETING", "0:00", "Briefing in Progress", "EVENT");
                    return;
                } else if (now < meetStart) {
                    updatePane(pane, 'state-meeting', "MEETING", formatTime(meetStart - now), "Meeting Prep", "EVENT");
                    return;
                }
            }

            // 2. Lunch Check
            if (config.lunchHour !== 0 && now.getHours() === config.lunchHour) {
                const nextSession = schedule.find(s => s.start > now);
                updatePane(pane, 'state-ready', "LUNCH BREAK", formatTime(nextSession.start - now), "LUNCH");
                return;
            }

            const current = schedule.find(s => now >= s.start && now < s.end);
            const next = schedule.find(s => s.start > now);

            if (current) {
                const remaining = current.end - now;
                let state = (remaining < (config.preStand * 60000)) ? 'state-ending' : 'state-ready';
                let status = (remaining < (config.preStand * 60000)) ? 'RETURNING RIDER' : 'HOT SESSION';
                updatePane(pane, state, status, formatTime(remaining), current.label);
            } else if (next) {
                const diffMins = (next.start - now) / 60000;
                let state = 'state-ready', status = 'STANDBY';
                if (diffMins <= config.preGear) { state = 'state-gearup'; status = 'GEAR UP'; }
                else if (diffMins <= config.preWarmup) { state = 'state-warmup'; status = 'WARMUP'; }
                updatePane(pane, state, status, formatTime(next.start - now), next.label);
            } else {
                updatePane(pane, 'state-sleep', 'FINISHED', '--:--', 'OFF');
            }
        }

        function updatePane(el, state, status, time, tag) {
            el.className = `group-pane ${state}`;
            el.querySelector('.status-label').innerText = status;
            el.querySelector('.countdown-timer').innerText = time;
            el.querySelector('.session-tag').innerText = tag;
        }

        function getNow() {
            if (!config.dbgOn) return new Date();
            const val = document.getElementById('cfg-dbg-time').value;
            if(!val) return new Date();
            const [h, m, s] = val.split(':');
            const d = new Date(); d.setHours(h, m, s || 0); return d;
        }

        function tick() {
            document.getElementById('sys-clock').innerText = getNow().toLocaleTimeString([], { hour12: false });
            Object.keys(groupSchedules).forEach(idx => processGroup(idx, groupSchedules[idx]));
        }
    </script>
</body>
</html>
